<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #2d2d2d;
      background: #fff;
    }

    /* ── Hero Header ── */
    .site-header {
      background: linear-gradient(135deg, #155799, #159957);
      color: #fff;
      padding: 48px 40px 40px;
      text-align: center;
    }
    .site-header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .site-header p {
      font-size: 1.05rem;
      opacity: 0.88;
      margin-top: 8px;
    }
    .btn-github {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 22px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 4px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-github:hover { background: rgba(255,255,255,0.15); border-color: #fff; }

    /* ── Navigation Bar ── */
    .site-nav {
      background: #1a2b3c;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .site-nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 900px;
      margin: 0 auto;
    }
    .site-nav a {
      display: block;
      padding: 15px 22px;
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    .site-nav a:hover  { background: #155799; color: #fff; }
    .site-nav a.active { background: #159957; color: #fff; }

    /* ── Main Content ── */
    .main-content {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 40px 60px;
    }
    .main-content h1 { font-size: 2rem; margin-bottom: 16px; color: #155799; }
    .main-content h2 { font-size: 1.4rem; margin: 36px 0 12px; color: #1a2b3c; border-bottom: 2px solid #e8f0fe; padding-bottom: 6px; }
    .main-content h3 { font-size: 1.15rem; margin: 28px 0 8px; color: #155799; }
    .main-content p  { margin-bottom: 16px; }
    .main-content ul, .main-content ol { margin: 0 0 16px 24px; }
    .main-content li { margin-bottom: 6px; }
    .main-content hr { border: none; border-top: 1px solid #e0e0e0; margin: 36px 0; }
    .main-content blockquote { border-left: 4px solid #159957; padding: 12px 20px; background: #f6fff9; color: #444; margin: 20px 0; }
    .main-content a { color: #155799; text-decoration: underline; }
    .main-content a:hover { color: #159957; }
    .main-content table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.95rem; }
    .main-content th { background: #155799; color: #fff; padding: 10px 14px; text-align: left; }
    .main-content td { padding: 10px 14px; border-bottom: 1px solid #e0e0e0; }
    .main-content tr:nth-child(even) td { background: #f9fafb; }
    .main-content .btn { display: inline-block; padding: 9px 20px; background: #155799; color: #fff; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 0.9rem; margin: 4px 4px 4px 0; transition: background 0.2s; }
    .main-content .btn:hover { background: #159957; color: #fff; }

    /* ── Footer ── */
    .site-footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 0.8rem;
      color: #888;
      border-top: 1px solid #eee;
      margin-top: 40px;
    }
    .site-footer a { color: #155799; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .site-header { padding: 32px 20px 28px; }
      .site-header h1 { font-size: 1.7rem; }
      .site-nav ul { flex-direction: column; }
      .site-nav a { text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .main-content { padding: 32px 20px 48px; }
    }
  </style>
</head>
<body>

  <div class="site-header">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
    <a class="btn-github" href="https://github.com/duanzhuojun/SmartGrow">View on GitHub</a>
  </div>

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <ul>
      <li><a href="{{ '/index.html' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} class="active"{% endif %}>Introduction</a></li>
      <li><a href="{{ '/team.html' | relative_url }}"{% if page.url == '/team.html' %} class="active"{% endif %}>Team</a></li>
      <li><a href="{{ '/activities.html' | relative_url }}"{% if page.url == '/activities.html' %} class="active"{% endif %}>Learning Activities</a></li>
      <li><a href="{{ '/recruiting.html' | relative_url }}"{% if page.url == '/recruiting.html' %} class="active"{% endif %}>Recruiting</a></li>
      <li><a href="{{ '/contact.html' | relative_url }}"{% if page.url == '/contact.html' %} class="active"{% endif %}>Contact</a></li>
    </ul>
  </nav>

  <main class="main-content" role="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <a href="https://github.com/duanzhuojun/SmartGrow">SmartGrow</a> &mdash; Precision Agriculture Education &mdash;
    Generated by <a href="https://pages.github.com">GitHub Pages</a>
  </footer>

</body>
</html>
